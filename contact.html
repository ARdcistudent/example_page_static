<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">

    <title>Kontakt | Travalala</title>
</head>
<body>

    <header>
        <a href="./index.html">
            <img src="" alt="logo">
        </a>

        <div class="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav>
            <ul>
                <li><a href="./index.html">Startseite</a></li>
                <li><a href="./events.html">Events</a></li>
                <li><a href="./menue.html">Speise- & Getränkekarte</a></li>
                <li><a href="./gutscheine.html">Gutscheine</a></li>
                <li><a href="./reservations.html">Reservierungen</a></li>
                <li><a href="./contact.html">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="contact_section">

            <h1>Kontakt</h1>
            <h2>Wir freuen uns auf Ihre Nachricht!</h2>

            <form class="contact_form">

                <!-- Anliegen -->
                <div class="form_group">
                    <label for="topic">Worum geht es?</label>

                    <select id="topic" name="topic" required>
                        <option value="">Bitte auswählen</option>
                        <option value="reservierung">Tischreservierung</option>
                        <option value="musiker">Auftrittsanfrage für Musiker</option>
                        <option value="allgemein">Allgemeine Fragen</option>
                    </select>
                </div>

                <!-- Name -->
                <div class="form_group">
                    <label for="name">Name</label>

                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Ihr Name"
                        required
                    >
                </div>

                <!-- Email -->
                <div class="form_group">
                    <label for="email">E-Mail</label>

                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="ihre@email.de"
                        required
                    >
                </div>

                <!-- Telefonnummer -->
                <div class="form_group">
                    <label for="phone">Telefonnummer</label>

                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="+49..."
                    >
                </div>

                <!-- Nachricht -->
                <div class="form_group">
                    <label for="message">Nachricht</label>

                    <textarea 
                        id="message" 
                        name="message" 
                        rows="8"
                        placeholder="Ihre Nachricht..."
                        required
                    ></textarea>
                </div>

                <!-- Button -->
                <button type="submit" class="cta_btn">
                    Nachricht senden
                </button>

            </form>

        </section>

    </main>

    <footer>

        <div class="footer_left">
            <a href="./impressum.html">Impressum</a>
            <a href="./datasec.html">Datenschutz</a>
            <a href="./contact.html">Kontaktformular</a>
        </div>

        <div class="footer_right">
            <a href="#">
                <img src="" alt="Instagram" class="sm_logos">
            </a>

            <a href="#">
                <img src="" alt="Facebook" class="sm_logos">
            </a>
        </div>

        <div class="footer_downside_center">
            <h4>Meine Partner</h4>

            <a href="#"><img src="" alt="Partner"></a>
            <a href="#"><img src="" alt="Partner"></a>
            <a href="#"><img src="" alt="Partner"></a>
        </div>

    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const burger = document.querySelector(".burger");
            const nav = document.querySelector("nav");

            burger.addEventListener("click", () => {

                nav.classList.toggle("active");
                burger.classList.toggle("active");

            });

        });
    </script>

</body>
</html>
